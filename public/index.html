<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ali Baba Marketing Pro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');
  :root {
    --green:#25D366; --green-dark:#128C7E; --chat-bg:#111b21;
    --header-bg:#202c33; --input-bg:#2a3942; --user-bubble:#005c4b;
    --bot-bubble:#202c33; --text:#e9edef; --muted:#8696a0;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Poppins',sans-serif;background:#0a0a0a;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:8px;}
  .frame{width:100%;max-width:430px;height:96vh;max-height:860px;background:var(--chat-bg);border-radius:20px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 60px rgba(37,211,102,0.12);border:1px solid rgba(37,211,102,0.08);}
  .header{background:var(--header-bg);padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,0.05);}
  .avatar{width:42px;height:42px;background:linear-gradient(135deg,#25D366,#128C7E);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .hname{color:var(--text);font-size:15px;font-weight:600;}
  .hstatus{color:var(--green);font-size:12px;display:flex;align-items:center;gap:4px;}
  .dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .msgs{flex:1;overflow-y:auto;padding:14px 10px;display:flex;flex-direction:column;gap:5px;}
  .msgs::-webkit-scrollbar{width:3px;}
  .msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px;}
  .row{display:flex;align-items:flex-end;gap:6px;animation:fi .3s ease;}
  @keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .row.user{justify-content:flex-end;}
  .row.bot{justify-content:flex-start;}
  .bub{max-width:80%;padding:8px 11px;border-radius:12px;font-size:13.5px;line-height:1.55;color:var(--text);}
  .ubub{background:var(--user-bubble);border-bottom-right-radius:3px;}
  .bbub{background:var(--bot-bubble);border-bottom-left-radius:3px;border:1px solid rgba(255,255,255,.05);}
  .btime{font-size:10px;color:var(--muted);text-align:right;margin-top:3px;}
  .tick{color:var(--green);}
  .img-preview{max-width:200px;border-radius:8px;margin-top:6px;cursor:pointer;}
  .typing{display:flex;align-items:center;gap:4px;padding:10px 13px;background:var(--bot-bubble);border-radius:12px;border-bottom-left-radius:3px;width:fit-content;border:1px solid rgba(255,255,255,.05);}
  .typing span{width:7px;height:7px;background:var(--muted);border-radius:50%;animation:b 1.2s infinite;}
  .typing span:nth-child(2){animation-delay:.2s;}
  .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes b{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
  .divider{text-align:center;color:var(--muted);font-size:11px;background:rgba(255,255,255,.04);padding:3px 10px;border-radius:8px;align-self:center;margin:4px 0;}
  .input-area{background:var(--header-bg);padding:10px 10px;display:flex;align-items:center;gap:8px;border-top:1px solid rgba(255,255,255,.05);}
  .upload-btn{width:38px;height:38px;background:var(--input-bg);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;color:var(--muted);transition:all .2s;}
  .upload-btn:hover{background:rgba(37,211,102,.15);color:var(--green);}
  .inp{flex:1;background:var(--input-bg);border:none;outline:none;color:var(--text);font-family:'Poppins',sans-serif;font-size:13.5px;padding:10px 13px;border-radius:22px;resize:none;max-height:90px;line-height:1.4;}
  .inp::placeholder{color:var(--muted);}
  .send{width:40px;height:40px;background:var(--green);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .2s;flex-shrink:0;}
  .send:hover{background:var(--green-dark);}
  .send:active{transform:scale(.95);}
  #fileInput{display:none;}
  .foot{text-align:center;font-size:10px;color:var(--muted);padding:3px;background:var(--header-bg);}

  /* upload preview bar */
  .upload-preview{display:none;align-items:center;gap:8px;background:var(--input-bg);padding:8px 12px;border-top:1px solid rgba(255,255,255,.05);}
  .upload-preview img{width:40px;height:40px;object-fit:cover;border-radius:6px;}
  .upload-preview span{flex:1;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .remove-upload{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;}
</style>
</head>
<body>
<div class="frame">
  <div class="header">
    <div class="avatar">🛍️</div>
    <div>
      <div class="hname">Ali Baba Marketing Pro</div>
      <div class="hstatus"><div class="dot"></div> Online</div>
    </div>
  </div>

  <div class="msgs" id="msgs"><div class="divider">Aaj</div></div>

  <!-- Upload preview bar -->
  <div class="upload-preview" id="uploadPreview">
    <img id="previewImg" src="" alt="preview"/>
    <span id="previewName"></span>
    <button class="remove-upload" onclick="removeUpload()">✕</button>
  </div>

  <div class="input-area">
    <button class="upload-btn" onclick="document.getElementById('fileInput').click()" title="Screenshot bhejen">📎</button>
    <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)"/>
    <textarea class="inp" id="inp" placeholder="Message likhein..." rows="1"
      onkeydown="handleKey(event)" oninput="autoR(this)"></textarea>
    <button class="send" onclick="send()">➤</button>
  </div>
  <div class="foot">🔒 Secure Chat — Ali Baba Marketing Pro</div>
</div>

<script>
const BASE = '';  // same origin
let sessionId = localStorage.getItem('abmp_session');
let pendingFile = null;

function time(){return new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});}

function addMsg(text, role, imageUrl=null){
  const c=document.getElementById('msgs');
  const row=document.createElement('div');
  row.className=`row ${role}`;
  const bub=document.createElement('div');
  bub.className=`bub ${role==='user'?'ubub':'bbub'}`;

  if(imageUrl){
    const img=document.createElement('img');
    img.src=imageUrl; img.className='img-preview';
    img.onclick=()=>window.open(imageUrl,'_blank');
    bub.appendChild(img);
    if(text){const p=document.createElement('div');p.innerHTML=fmt(text);bub.appendChild(p);}
  } else {
    bub.innerHTML=fmt(text);
  }

  const t=document.createElement('div');
  t.className='btime';
  t.innerHTML=time()+(role==='user'?' <span class="tick">✓✓</span>':'');
  bub.appendChild(t);
  row.appendChild(bub);
  c.appendChild(row);
  c.scrollTop=c.scrollHeight;
}

function fmt(t){
  return t.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
}

function showTyping(){
  const c=document.getElementById('msgs');
  const r=document.createElement('div');
  r.className='row bot'; r.id='typ';
  r.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
  c.appendChild(r); c.scrollTop=c.scrollHeight;
}
function removeTyping(){const e=document.getElementById('typ');if(e)e.remove();}

async function initSession(){
  if(!sessionId){
    const r=await fetch(`${BASE}/api/session`,{method:'POST'});
    const d=await r.json();
    sessionId=d.sessionId;
    localStorage.setItem('abmp_session',sessionId);
  }
  // Send greeting
  showTyping();
  setTimeout(async()=>{
    removeTyping();
    const greet=`Assalamualaikum! ✨\n\nAli Baba Marketing Pro mein khush aamdeed!\n\nHum in services mein aapki madad kar sakte hain:\n📸 Instagram — Followers, Likes, Views\n👤 Facebook — Followers, Likes, Views, Reviews\n🎵 TikTok — Followers, Likes, Views, Monetization\n▶️ YouTube — Subscribers, Likes, Views\n📢 Facebook & Instagram Ads\n\nAap kya lena chahte hain? 😊`;
    addMsg(greet,'bot');
    // log greeting
    await fetch(`${BASE}/api/chat`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({sessionId, message:'[SYSTEM: Customer ne chat shuru ki — greeting bhejo]'})
    });
  },800);
}

async function send(){
  const inp=document.getElementById('inp');
  const text=inp.value.trim();

  if(pendingFile){
    await sendScreenshot(text);
    return;
  }
  if(!text) return;

  inp.value=''; inp.style.height='auto';
  addMsg(text,'user');
  showTyping();

  const delay=800+Math.random()*1000;
  setTimeout(async()=>{
    try{
      const r=await fetch(`${BASE}/api/chat`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({sessionId, message:text})
      });
      const d=await r.json();
      removeTyping();
      addMsg(d.reply||'Maafi, kuch error aayi.','bot');
    }catch{
      removeTyping();
      addMsg('Connection issue — thodi der baad try karein 🙏','bot');
    }
  },delay);
}

function handleFileSelect(e){
  const file=e.target.files[0];
  if(!file) return;
  pendingFile=file;
  const reader=new FileReader();
  reader.onload=ev=>{
    document.getElementById('previewImg').src=ev.target.result;
    document.getElementById('previewName').textContent=file.name;
    document.getElementById('uploadPreview').style.display='flex';
    document.getElementById('inp').placeholder='Caption likhein (optional)...';
  };
  reader.readAsDataURL(file);
}

function removeUpload(){
  pendingFile=null;
  document.getElementById('fileInput').value='';
  document.getElementById('uploadPreview').style.display='none';
  document.getElementById('inp').placeholder='Message likhein...';
}

async function sendScreenshot(caption){
  const file=pendingFile;
  const previewSrc=document.getElementById('previewImg').src;
  removeUpload();
  document.getElementById('inp').value='';

  addMsg(caption||'Payment screenshot','user', previewSrc);
  showTyping();

  const form=new FormData();
  form.append('screenshot',file);
  form.append('sessionId',sessionId);
  if(caption) form.append('caption',caption);

  setTimeout(async()=>{
    try{
      const r=await fetch(`${BASE}/api/screenshot`,{method:'POST',body:form});
      const d=await r.json();
      removeTyping();
      addMsg(d.reply,'bot');
    }catch{
      removeTyping();
      addMsg('Screenshot send nahi hui — dobara try karein 🙏','bot');
    }
  },1200);
}

function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function autoR(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,90)+'px';}

window.onload=initSession;
</script>
</body>
</html>
