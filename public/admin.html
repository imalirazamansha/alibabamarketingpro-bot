<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Ali Baba Marketing Pro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
  :root{--green:#25D366;--dark:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#25D366;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Poppins',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;}

  /* LOGIN */
  #loginScreen{display:flex;justify-content:center;align-items:center;min-height:100vh;}
  .login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px 32px;width:100%;max-width:380px;text-align:center;}
  .login-box h1{font-size:22px;margin-bottom:6px;}
  .login-box p{color:var(--muted);font-size:13px;margin-bottom:24px;}
  .login-box input{width:100%;background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-size:14px;outline:none;margin-bottom:12px;font-family:'Poppins',sans-serif;}
  .login-box input:focus{border-color:var(--green);}
  .btn-green{width:100%;background:var(--green);border:none;border-radius:8px;padding:12px;color:#000;font-size:15px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;transition:.2s;}
  .btn-green:hover{background:#1db954;}
  .err{color:#f85149;font-size:12px;margin-top:8px;}

  /* ADMIN */
  #adminScreen{display:none;}
  .topbar{background:var(--card);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
  .topbar h1{font-size:16px;font-weight:700;}
  .topbar span{color:var(--muted);font-size:13px;}
  .logout{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:8px;cursor:pointer;font-family:'Poppins',sans-serif;font-size:13px;}
  .logout:hover{border-color:var(--green);color:var(--green);}
  .layout{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 53px);}

  /* SIDEBAR */
  .sidebar{border-right:1px solid var(--border);overflow-y:auto;background:var(--card);}
  .sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
  .sidebar-header input{flex:1;background:var(--dark);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:13px;outline:none;font-family:'Poppins',sans-serif;}
  .refresh-btn{background:none;border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:14px;}
  .refresh-btn:hover{border-color:var(--green);color:var(--green);}
  .conv-item{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:.15s;}
  .conv-item:hover{background:rgba(37,211,102,.06);}
  .conv-item.active{background:rgba(37,211,102,.1);border-left:3px solid var(--green);}
  .conv-id{font-size:11px;color:var(--muted);font-family:monospace;}
  .conv-preview{font-size:13px;color:var(--text);margin:3px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .conv-meta{display:flex;justify-content:space-between;align-items:center;}
  .conv-time{font-size:11px;color:var(--muted);}
  .badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;}
  .badge.active{background:rgba(37,211,102,.15);color:var(--green);}
  .badge.order_confirmed{background:rgba(88,166,255,.15);color:#58a6ff;}
  .badge.payment_received{background:rgba(63,185,80,.2);color:#3fb950;}
  .badge.payment_screenshot_received{background:rgba(210,153,34,.15);color:#d2a00d;}
  .no-convs{text-align:center;color:var(--muted);padding:40px 16px;font-size:13px;}

  /* CHAT VIEW */
  .chat-view{display:flex;flex-direction:column;overflow:hidden;}
  .chat-header{padding:14px 20px;border-bottom:1px solid var(--border);background:var(--card);}
  .chat-header h2{font-size:15px;}
  .chat-header p{color:var(--muted);font-size:12px;margin-top:2px;}
  .status-badges{display:flex;gap:8px;margin-top:6px;}
  .sbadge{font-size:11px;padding:2px 8px;border-radius:10px;}
  .sbadge.ok{background:rgba(63,185,80,.2);color:#3fb950;}
  .sbadge.pending{background:rgba(139,148,158,.15);color:var(--muted);}

  .chat-msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:6px;}
  .chat-msgs::-webkit-scrollbar{width:4px;}
  .chat-msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .msg-row{display:flex;gap:8px;}
  .msg-row.user{justify-content:flex-end;}
  .msg-row.bot{justify-content:flex-start;}
  .msg-bub{max-width:70%;padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.55;}
  .msg-bub.user{background:#005c4b;border-bottom-right-radius:3px;}
  .msg-bub.bot{background:#21262d;border:1px solid var(--border);border-bottom-left-radius:3px;}
  .msg-bub img{max-width:180px;border-radius:8px;display:block;margin-top:6px;cursor:pointer;}
  .msg-time{font-size:10px;color:var(--muted);margin-top:3px;text-align:right;}
  .msg-label{font-size:10px;color:var(--muted);margin-bottom:2px;}
  .empty-state{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px;}

  @media(max-width:700px){
    .layout{grid-template-columns:1fr;}
    .sidebar{height:50vh;}
    .chat-view{height:50vh;}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div style="font-size:36px;margin-bottom:12px">🛍️</div>
    <h1>Admin Panel</h1>
    <p>Ali Baba Marketing Pro</p>
    <input type="password" id="passInput" placeholder="Admin password" onkeydown="if(event.key==='Enter')login()"/>
    <button class="btn-green" onclick="login()">Login</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen">
  <div class="topbar">
    <h1>🛍️ Ali Baba Marketing Pro — Admin</h1>
    <div style="display:flex;align-items:center;gap:12px;">
      <span id="convCount">Loading...</span>
      <button class="logout" onclick="logout()">Logout</button>
    </div>
  </div>
  <div class="layout">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <input type="text" placeholder="Search..." id="searchInp" oninput="filterConvs()"/>
        <button class="refresh-btn" onclick="loadConversations()" title="Refresh">↻</button>
      </div>
      <div id="convList"></div>
    </div>
    <!-- Chat -->
    <div class="chat-view" id="chatView">
      <div class="empty-state">← Koi conversation select karein</div>
    </div>
  </div>
</div>

<script>
let adminToken='';
let allConvs=[];
let selectedId=null;
let autoRefresh=null;

async function login(){
  const pass=document.getElementById('passInput').value;
  try{
    const r=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pass})});
    const d=await r.json();
    if(d.success){
      adminToken=d.token;
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('adminScreen').style.display='block';
      loadConversations();
      autoRefresh=setInterval(loadConversations,15000);
    } else {
      document.getElementById('loginErr').textContent='Wrong password!';
    }
  }catch{document.getElementById('loginErr').textContent='Server error';}
}

function logout(){
  clearInterval(autoRefresh);
  adminToken=''; allConvs=[]; selectedId=null;
  document.getElementById('adminScreen').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
}

async function loadConversations(){
  try{
    const r=await fetch('/api/admin/conversations',{headers:{'x-admin-token':adminToken}});
    allConvs=await r.json();
    document.getElementById('convCount').textContent=`${allConvs.length} conversations`;
    renderList(allConvs);
    if(selectedId) loadChat(selectedId);
  }catch{}
}

function filterConvs(){
  const q=document.getElementById('searchInp').value.toLowerCase();
  const filtered=allConvs.filter(c=>{
    const msgs=c.messages||[];
    return msgs.some(m=>m.content&&m.content.toLowerCase().includes(q));
  });
  renderList(filtered);
}

function renderList(list){
  const el=document.getElementById('convList');
  if(!list.length){el.innerHTML='<div class="no-convs">Koi conversation nahi mili</div>';return;}
  el.innerHTML=list.map(c=>{
    const msgs=c.messages||[];
    const last=msgs.filter(m=>m.type!=='system').slice(-1)[0];
    const preview=last?(last.type==='image'?'📷 Screenshot':''+last.content.slice(0,50)):'No messages';
    const t=new Date(c.lastActivity).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
    const badge=c.status||'active';
    return `<div class="conv-item ${c.id===selectedId?'active':''}" onclick="loadChat('${c.id}')">
      <div class="conv-meta">
        <span class="conv-id">${c.id.slice(0,8)}...</span>
        <span class="badge ${badge}">${badge.replace(/_/g,' ')}</span>
      </div>
      <div class="conv-preview">${preview}</div>
      <div class="conv-meta"><span class="conv-time">${t}</span></div>
    </div>`;
  }).join('');
}

async function loadChat(id){
  selectedId=id;
  renderList(allConvs); // re-render to show active
  try{
    const r=await fetch(`/api/admin/conversations/${id}`,{headers:{'x-admin-token':adminToken}});
    const conv=await r.json();
    renderChat(conv);
  }catch{}
}

function renderChat(conv){
  const msgs=(conv.messages||[]).filter(m=>!m.content?.startsWith('[SYSTEM'));
  const orderOk=conv.orderConfirmed;
  const payOk=conv.paymentReceived;
  const start=new Date(conv.startTime).toLocaleString('en-PK');

  document.getElementById('chatView').innerHTML=`
    <div class="chat-header">
      <h2>Conversation: ${conv.id.slice(0,16)}...</h2>
      <p>Started: ${start}</p>
      <div class="status-badges">
        <span class="sbadge ${orderOk?'ok':'pending'}">${orderOk?'✅ Order Confirmed':'⏳ Order Pending'}</span>
        <span class="sbadge ${payOk?'ok':'pending'}">${payOk?'✅ Payment Received':'⏳ Payment Pending'}</span>
      </div>
    </div>
    <div class="chat-msgs" id="chatMsgs">
      ${msgs.map(m=>{
        const role=m.role==='user'?'user':'bot';
        const label=role==='user'?'Customer':'AI Agent';
        const t=new Date(m.time).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
        const imgHtml=m.imageUrl?`<img src="${m.imageUrl}" onclick="window.open('${m.imageUrl}','_blank')"/>`:''
        return `<div>
          <div class="msg-label">${label}</div>
          <div class="msg-row ${role}">
            <div class="msg-bub ${role}">
              ${m.content.replace(/\n/g,'<br>')}
              ${imgHtml}
              <div class="msg-time">${t}</div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  const cm=document.getElementById('chatMsgs');
  if(cm) cm.scrollTop=cm.scrollHeight;
}
</script>
</body>
</html>
